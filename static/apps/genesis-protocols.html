<script>
  if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) {
    const ring = document.getElementById('cursor-ring');
    const dot = document.getElementById('cursor-dot');
    let isVisible = false;
    let mouseX = 0, mouseY = 0;
    let ringX = 0, ringY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      if (!isVisible) {
        isVisible = true;
        ring.style.opacity = 1;
        dot.style.opacity = 1;
      }
      dot.style.left = `${mouseX}px`;
      dot.style.top = `${mouseY}px`;
    });

    document.addEventListener('mouseenter', () => {
      isVisible = true;
      ring.style.opacity = 1;
      dot.style.opacity = 1;
    });

    document.addEventListener('mouseleave', () => {
      isVisible = false;
      ring.style.opacity = 0;
      dot.style.opacity = 0;
    });

    const animate = () => {
      ringX += (mouseX - ringX) * 0.15;
      ringY += (mouseY - ringY) * 0.15;
      ring.style.left = `${ringX}px`;
      ring.style.top = `${ringY}px`;
      requestAnimationFrame(animate);
    };
    requestAnimationFrame(animate);

    // Track hover
    const addHoverListeners = () => {
      const interactiveEls = document.querySelectorAll('button, a, [role="button"], input, select, textarea');
      interactiveEls.forEach(el => {
        if (!el.hasAttribute('data-cursor-hover')) {
          el.setAttribute('data-cursor-hover', 'true');
          el.addEventListener('mouseenter', () => {
            ring.classList.add('hovering');
            dot.classList.add('hovering');
          });
          el.addEventListener('mouseleave', () => {
            ring.classList.remove('hovering');
            dot.classList.remove('hovering');
          });
        }
      });
    };
    
    // Check periodically for new interactive elements since React renders dynamically
    setInterval(addHoverListeners, 1000);
  }
</script>
</body>
</html>
