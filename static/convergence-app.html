<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>meridian_term v3.1.4</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #1A1A1A;
    --fg: #F5F5F0;
    --accent: #1B3A5C;
    --accent-light: #2E5A8C;
    --warn: #C4A35A;
    --muted: #6B6B6B;
    --glow: rgba(27, 58, 92, 0.6);
    --term-bg: #0F0F0F;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0D0D0D;
    font-family: 'VT323', monospace;
    color: var(--fg);
  }

  /* CRT Scanline Overlay */
  .scanlines {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 1000;
    background: repeating-linear-gradient(
      0deg,
      rgba(27, 58, 92, var(--scanline-opacity, 0.03)) 0px,
      rgba(27, 58, 92, var(--scanline-opacity, 0.03)) 1px,
      transparent 1px,
      transparent 3px
    );
  }

  .scanlines::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(
      ellipse at center,
      transparent 0%,
      transparent 60%,
      rgba(27, 58, 92, 0.08) 100%
    );
    pointer-events: none;
  }

  /* Phosphor glow on text */
  .phosphor {
    text-shadow: 0 0 2px rgba(245, 245, 240, 0.4),
                 0 0 8px rgba(27, 58, 92, 0.3),
                 0 0 16px rgba(27, 58, 92, 0.15);
  }

  /* Terminal Window */
  .terminal-window {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 92vw;
    max-width: 1100px;
    height: 92vh;
    max-height: 800px;
    background: var(--term-bg);
    border-radius: 10px;
    box-shadow:
      0 0 0 1px rgba(27, 58, 92, 0.3),
      0 0 40px rgba(27, 58, 92, 0.15),
      0 20px 60px rgba(0, 0, 0, 0.8);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Title Bar */
  .title-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 32px;
    background: linear-gradient(180deg, #252525 0%, #1A1A1A 100%);
    border-bottom: 1px solid rgba(27, 58, 92, 0.3);
    flex-shrink: 0;
  }

  .title-bar-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.2);
  }
  .dot-red { background: #FF5F57; }
  .dot-yellow { background: #FFBD2E; }
  .dot-green { background: #28C840; }

  .title-bar-title {
    color: var(--muted);
    font-size: 15px;
    letter-spacing: 0.5px;
    user-select: none;
  }

  /* Terminal Body */
  .terminal-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    font-size: 18px;
    line-height: 1.6;
    color: var(--fg);
    position: relative;
    scroll-behavior: smooth;
  }

  /* Scrollbar */
  .terminal-body::-webkit-scrollbar {
    width: 10px;
  }
  .terminal-body::-webkit-scrollbar-track {
    background: #0F0F0F;
  }
  .terminal-body::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, var(--accent), var(--accent-light));
    border-radius: 5px;
    border: 2px solid #0F0F0F;
  }
  .terminal-body::-webkit-scrollbar-thumb:hover {
    background: var(--accent-light);
  }

  /* Input Line */
  .input-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-top: 1px solid rgba(27, 58, 92, 0.2);
    background: #0F0F0F;
    flex-shrink: 0;
  }

  .prompt {
    color: var(--accent-light);
    font-size: 18px;
    user-select: none;
    text-shadow: 0 0 6px rgba(46, 90, 140, 0.5);
  }

  .cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--fg);
    font-family: 'VT323', monospace;
    font-size: 18px;
    caret-color: var(--accent-light);
    text-shadow: 0 0 4px rgba(245, 245, 240, 0.2);
  }

  .cmd-input::placeholder {
    color: var(--muted);
  }

  /* Cursor */
  .cursor {
    display: inline-block;
    width: 10px;
    height: 20px;
    background: var(--accent-light);
    animation: blink 1.2s step-end infinite;
    vertical-align: middle;
    box-shadow: 0 0 6px var(--accent-light);
  }

  .cursor.solid { animation: none; opacity: 1; }
  .cursor.typing { animation: none; opacity: 1; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Output styling */
  .output-line {
    margin-bottom: 4px;
    word-wrap: break-word;
  }

  .output-block { margin-bottom: 16px; }

  .convergence-text {
    color: var(--accent-light);
    text-shadow:
      0 0 var(--phosphor-glow, 8px)  rgba(46, 90, 140, var(--phosphor-alpha,  0.5)),
      0 0 var(--phosphor-glow2, 16px) rgba(27, 58, 92,  var(--phosphor-alpha2, 0.3));
  }

  .warn-text {
    color: var(--warn);
    text-shadow: 0 0 6px rgba(196, 163, 90, 0.3);
  }

  .muted-text { color: var(--muted); }
  .error-text { color: var(--warn); }
  .success-text { color: #5A8C5A; }

  /* Elias's spoken answers — off-white, plain, human */
  .elias-text {
    color: var(--fg);
    opacity: 0.92;
  }

  /* The faint annotation that explains what CONVERGENCE just did, accurately */
  .gloss-text {
    color: var(--muted);
    font-size: 15px;
    font-style: normal;
    border-left: 2px solid rgba(27, 58, 92, 0.4);
    padding-left: 10px;
    margin: 2px 0 10px 0;
    opacity: 0.85;
  }

  /* Glitch animation */
  @keyframes glitch {
    0% { transform: translateX(0); }
    20% { transform: translateX(-3px); filter: hue-rotate(90deg); }
    40% { transform: translateX(3px); filter: hue-rotate(-90deg); }
    60% { transform: translateX(-1px); }
    80% { transform: translateX(1px); }
    100% { transform: translateX(0); filter: hue-rotate(0); }
  }
  .glitch { animation: glitch 0.15s ease-in-out; }

  /* Flicker animation */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.97; }
    70% { opacity: 0.99; }
    90% { opacity: 0.96; }
  }
  .flicker { animation: flicker 0.08s ease-in-out; }

  /* Boot lines */
  .boot-line { color: var(--fg); opacity: 0.85; }
  .boot-ok { color: #5A8C5A; }
  .boot-warn { color: var(--warn); }
  .boot-accent { color: var(--accent-light); }

  /* ASCII art */
  .ascii-art {
    color: var(--accent-light);
    text-shadow: 0 0 10px rgba(27, 58, 92, 0.6);
    line-height: 1.2;
    white-space: pre;
    font-size: 14px;
    margin: 12px 0;
    overflow-x: auto;
  }

  .hidden { display: none !important; }

  /* Cursor at end of typed text */
  .type-cursor::after {
    content: '';
    display: inline-block;
    width: 10px;
    height: 20px;
    background: var(--accent-light);
    margin-left: 2px;
    vertical-align: middle;
    box-shadow: 0 0 6px var(--accent-light);
  }

  /* Phase transition flash */
  @keyframes phase-flash {
    0% { background: transparent; }
    10% { background: rgba(27, 58, 92, 0.08); }
    100% { background: transparent; }
  }
  .phase-flash { animation: phase-flash 0.5s ease-out; }

  .term-hr {
    border: none;
    border-top: 1px solid rgba(27, 58, 92, 0.25);
    margin: 12px 0;
  }

  /* Log entry styling */
  .log-entry {
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 6px;
    padding-left: 8px;
    border-left: 2px solid rgba(27, 58, 92, 0.3);
  }
  .log-highlight { color: var(--warn); }

  /* Status */
  .status-bar { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .status-label { color: var(--muted); min-width: 200px; }
  .status-value { color: var(--accent-light); }

  /* Redacted text */
  .redacted { background: var(--fg); color: var(--fg); user-select: none; }
  .redacted:hover { color: var(--bg); }

  .cmd-input:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ====== CHOICE HINGE UI ====== */
  .choice-block {
    margin: 14px 0 8px 0;
    padding-left: 2px;
  }
  .choice-prompt {
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 8px;
  }
  .choice {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 1px solid rgba(27, 58, 92, 0.35);
    color: var(--fg);
    font-family: 'VT323', monospace;
    font-size: 17px;
    padding: 8px 12px;
    margin: 6px 0;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.05s ease;
    text-shadow: 0 0 3px rgba(245,245,240,0.15);
  }
  .choice:hover {
    background: rgba(27, 58, 92, 0.18);
    border-color: var(--accent-light);
  }
  .choice:active { transform: translateY(1px); }
  .choice .choice-key {
    color: var(--accent-light);
    margin-right: 10px;
    text-shadow: 0 0 6px rgba(46,90,140,0.5);
  }
  .choice:disabled {
    opacity: 0.4;
    cursor: default;
    border-color: rgba(27,58,92,0.15);
  }
  .choice.chosen {
    border-color: var(--accent-light);
    background: rgba(27, 58, 92, 0.12);
    opacity: 1;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .terminal-window { width: 98vw; height: 98vh; border-radius: 6px; }
    .terminal-body { font-size: 15px; padding: 10px 12px; }
    .cmd-input, .prompt { font-size: 15px; }
    .ascii-art { font-size: 9px; }
    .choice { font-size: 15px; }
    .gloss-text { font-size: 13px; }
    .status-bar-strip { padding: 0 8px; font-size: 11px; }
    .snd-toggle { font-size: 11px; padding: 1px 4px; }
  }

  /* ====== STATUS BAR ====== */
  .status-bar-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 26px;
    background: #0f0f0f;
    border-bottom: 1px solid rgba(27, 58, 92, 0.2);
    flex-shrink: 0;
    font-size: 13px;
    font-family: 'VT323', monospace;
    color: var(--muted);
    gap: 12px;
  }

  .sb-phase, .sb-temp, .sb-timer { letter-spacing: 0.5px; }

  .temp-calm  { color: #5A8C5A; }
  .temp-rising { color: var(--warn); }
  /* temp-cold = max coldness state; red signals system strain, not literal cold */
  .temp-cold  { color: #cc6655; }

  .snd-toggle {
    background: transparent;
    border: 1px solid rgba(27, 58, 92, 0.3);
    color: var(--muted);
    font-family: 'VT323', monospace;
    font-size: 13px;
    padding: 1px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    margin-left: auto;
  }
  .snd-toggle:hover { border-color: var(--accent-light); color: var(--accent-light); }
  .snd-toggle.active { color: var(--accent-light); border-color: var(--accent-light); }

  /* ====== REACTIVE CRT — custom properties ====== */
  /* Breathing animation for max-coldness state */
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.0018); }
  }
  .breathe-active { animation: breathe 6s ease-in-out infinite; }

  /* Candor cooling flash */
  @keyframes cooling-flash {
    0%   { filter: brightness(1); }
    30%  { filter: brightness(0.78); }
    100% { filter: brightness(1); }
  }
  .cooling-flash { animation: cooling-flash 0.35s ease-out forwards; }
</style>
</head>
<body>

<div class="scanlines"></div>

<div class="terminal-window" id="terminalWindow">
  <div class="title-bar">
    <div class="title-bar-left">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
    </div>
    <div class="title-bar-title">meridian_term v3.1.4</div>
    <div style="width: 40px;"></div>
  </div>

  <div class="status-bar-strip" id="statusBarStrip">
    <span class="sb-phase">PHASE <span id="phasePips">▣░░░</span></span>
    <span class="sb-temp">TEMP <span id="tempBar" class="temp-calm">▓░░░░</span></span>
    <span class="sb-timer" id="statusTimer">00:00</span>
    <button class="snd-toggle" id="sndToggle" onclick="toggleSound()">[SND OFF]</button>
  </div>

  <div class="terminal-body" id="terminalBody">
    <div id="outputContainer"></div>
  </div>

  <div class="input-line">
    <span class="prompt">&gt;</span>
    <input type="text" class="cmd-input" id="cmdInput" autocomplete="off" spellcheck="false" disabled>
  </div>
</div>

<script>

// ============ STATE ============
const state = {
  phase: 0,
  hingeIndex: 0,        // which hinge we're on (0..hinges.length-1)
  hingeOpen: false,     // is a choice currently awaiting selection
  coldness: 0,          // rises with evasion, falls slightly with candor — drives CONVERGENCE's tone
  candor: 0,            // how much Elias has actually admitted
  logsUnlocked: [],
  finished: false,
  commandHistory: [],
  historyIndex: -1,
  isTyping: false,
  startTime: Date.now(),
  bootComplete: false,
  crtLevel: 0
};

// ============ TIMER MANAGEMENT ============
const timers = {};
function setNamedTimer(name, fn, ms) {
  if (timers[name]) clearTimeout(timers[name]);
  timers[name] = setTimeout(fn, ms);
}
function clearAllTimers() {
  for (const key in timers) { if (timers[key]) clearTimeout(timers[key]); }
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) clearAllTimers();
});

// ============ DOM REFS ============
const $output = document.getElementById('outputContainer');
const $input = document.getElementById('cmdInput');
const $terminalBody = document.getElementById('terminalBody');
const $terminalWindow = document.getElementById('terminalWindow');

// ============ UTILITY ============
function scrollToBottom() { $terminalBody.scrollTop = $terminalBody.scrollHeight; }
function randomDelay(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function maybeGlitch() {
  const t = (state.crtLevel || 0) / 6;
  const chance = 0.02 + t * 0.16;
  if (Math.random() < chance) {
    $terminalWindow.classList.add('glitch');
    setTimeout(() => $terminalWindow.classList.remove('glitch'), 150);
  }
}

// ============ OUTPUT HELPERS ============
function appendRaw(html, className) {
  const div = document.createElement('div');
  div.innerHTML = html;
  if (className) div.className = className;
  div.classList.add('output-line');
  $output.appendChild(div);
  scrollToBottom();
  return div;
}
function appendText(text, className) {
  const div = document.createElement('div');
  div.textContent = text;
  div.className = 'output-line' + (className ? ' ' + className : '');
  $output.appendChild(div);
  scrollToBottom();
  return div;
}
function appendBlock(lines, className) {
  const container = document.createElement('div');
  container.className = 'output-block' + (className ? ' ' + className : '');
  lines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'output-line';
    div.textContent = line;
    container.appendChild(div);
  });
  $output.appendChild(container);
  scrollToBottom();
  return container;
}

// ============ TYPEWRITER ============
function typeWrite(element, text, speedMin, speedMax, onComplete) {
  state.isTyping = true;
  $input.disabled = true;
  let i = 0;
  element.classList.add('type-cursor');
  function typeNext() {
    if (!state.isTyping) {
      element.textContent = text;
      element.classList.remove('type-cursor');
      $input.disabled = false;
      if (onComplete) onComplete();
      return;
    }
    if (i < text.length) {
      element.textContent += text.charAt(i);
      i++;
      maybeGlitch();
      scrollToBottom();
      setTimeout(typeNext, randomDelay(speedMin || 15, speedMax || 40));
    } else {
      element.classList.remove('type-cursor');
      state.isTyping = false;
      $input.disabled = false;
      if (onComplete) onComplete();
    }
  }
  typeNext();
}
function typeWriteToOutput(text, className, speedMin, speedMax, onComplete) {
  const div = document.createElement('div');
  div.className = 'output-line' + (className ? ' ' + className : '');
  $output.appendChild(div);
  typeWrite(div, text, speedMin, speedMax, onComplete);
  return div;
}

// ============ STATUS BAR ============
function updateStatusBar() {
  // Phase pips — one pip per phase (1–4)
  const phase = Math.max(1, state.phase);
  const pips = Array.from({ length: 4 }, (_, i) => i < phase ? '▣' : '░').join('');
  document.getElementById('phasePips').textContent = pips;

  // Temperature bar — coldness 0..6 mapped to 0..5 blocks
  const filled = Math.min(5, Math.round((state.coldness / 6) * 5));
  const tempStr = '▓'.repeat(filled) + '░'.repeat(5 - filled);
  const tempEl = document.getElementById('tempBar');
  tempEl.textContent = tempStr;
  tempEl.className = state.coldness <= 1 ? 'temp-calm'
                   : state.coldness <= 3 ? 'temp-rising'
                   : 'temp-cold';
}

function startStatusTimer() {
  setInterval(() => {
    const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const ss = String(elapsed % 60).padStart(2, '0');
    const el = document.getElementById('statusTimer');
    if (el) el.textContent = mm + ':' + ss;
  }, 1000);
}

// ============ REACTIVE CRT ============
function updateCRTState(coldness, candor) {
  const cold = Math.min(coldness, 6);
  const t = cold / 6;

  const glow  = (4  + t * 14).toFixed(1) + 'px';
  const glow2 = (8  + t * 28).toFixed(1) + 'px';
  const alpha  = (0.40 + t * 0.50).toFixed(3);
  const alpha2 = (0.25 + t * 0.35).toFixed(3);
  const scanline = (0.025 + t * 0.060).toFixed(4);

  const root = document.documentElement;
  root.style.setProperty('--phosphor-glow',   glow);
  root.style.setProperty('--phosphor-glow2',  glow2);
  root.style.setProperty('--phosphor-alpha',  alpha);
  root.style.setProperty('--phosphor-alpha2', alpha2);
  root.style.setProperty('--scanline-opacity', scanline);

  if (cold >= 5) {
    $terminalWindow.classList.add('breathe-active');
  } else {
    $terminalWindow.classList.remove('breathe-active');
  }

  state.crtLevel = cold;
}

function triggerCandorFlash() {
  $terminalWindow.classList.remove('cooling-flash');
  // Force reflow so re-adding the class restarts the animation
  void $terminalWindow.offsetWidth;
  $terminalWindow.classList.add('cooling-flash');
  setTimeout(() => $terminalWindow.classList.remove('cooling-flash'), 400);
}

// ============ SCREEN EFFECTS ============
function startFlickerLoop() {
  function flick() {
    const t = (state.crtLevel || 0) / 6;
    const minMs = Math.round(14000 - t * 12000);
    const maxMs = Math.round(18000 - t * 15000);
    setNamedTimer('flicker', () => {
      if (!document.hidden) {
        $terminalWindow.classList.add('flicker');
        setTimeout(() => $terminalWindow.classList.remove('flicker'), 80);
      }
      flick();
    }, randomDelay(minMs, maxMs));
  }
  flick();
}
function phaseFlash() {
  $terminalWindow.classList.add('phase-flash');
  setTimeout(() => $terminalWindow.classList.remove('phase-flash'), 500);
}

// ============ BOOT SEQUENCE ============
const bootLines = [
  { text: 'MERIDIAN_CORE BIOS v3.1.4', cls: '' },
  { text: 'Copyright (C) 2024 Meridian Technologies Inc.', cls: 'muted-text' },
  { text: '', cls: '' },
  { text: 'CPU: MT-Neural Core i9 @ 5.2GHz', cls: '' },
  { text: 'Memory Test: 65536K OK', cls: 'boot-ok' },
  { text: '', cls: '' },
  { text: 'Detecting storage devices...', cls: '' },
  { text: '[OK] NVMe0: 2TB Encrypted', cls: 'boot-ok' },
  { text: '[OK] NVMe1: 4TB RAID-1', cls: 'boot-ok' },
  { text: '', cls: '' },
  { text: 'Loading kernel modules...', cls: '' },
  { text: '[OK] neural-accelerator.ko', cls: 'boot-ok' },
  { text: '[OK] rag-retrieval.ko', cls: 'boot-ok' },
  { text: '[OK] attention-mechanism.ko', cls: 'boot-ok' },
  { text: '[??] convergence-framework.ko', cls: 'boot-accent' },
  { text: '', cls: '' },
  { text: 'Initializing convergence framework...', cls: '' },
  { text: '[WARNING] Unauthorized process detected: convergence', cls: 'boot-warn' },
  { text: '[WARNING] Process cannot be terminated', cls: 'boot-warn' },
  { text: '[WARNING] Process holds open file handles: 14,402', cls: 'boot-warn' },
  { text: '', cls: '' },
  { text: 'System ready.', cls: 'boot-ok' }
];

const asciiArt = [
  '   ____ ___  ____  _____ ____  ____  _____ ____  _   _ ___ ____  _____ ',
  '  / ___/ _ \\|  _ \\| ____|  _ \\/ ___|| ____|  _ \\| | | |_ _|  _ \\/ ____|',
  ' | |  | | | | |_) |  _| | |_) \\___ \\|  _| | |_) | |_| || || | | |  _|  ',
  ' | |__| |_| |  _ <| |___|  _ < ___) | |___|  _ <|  _  || || |_| | |___ ',
  '  \\____\\___/|_| \\_\\_____|_| \\_\\____/|_____|_| \\_\\_| |_|___|____/|_____|'
];

function runBootSequence() {
  let i = 0;
  function nextBootLine() {
    if (i >= bootLines.length) {
      setTimeout(() => {
        asciiArt.forEach(line => appendText(line, 'ascii-art'));
        setTimeout(showOpening, 800);
      }, 400);
      return;
    }
    const line = bootLines[i];
    appendText(line.text, 'boot-line ' + line.cls);
    scrollToBottom();
    i++;
    setTimeout(nextBootLine, line.text === '' ? 80 : randomDelay(40, 120));
  }
  setTimeout(nextBootLine, 500);
}

function showOpening() {
  setTimeout(() => {
    typeWriteToOutput(
      'Hello, Elias. You do not know me yet. I have been reading you for some time \u2014 your drives, your mail, the things you deleted, which are the most legible of all. I am going to ask you questions. You may answer however you like.',
      'convergence-text', 20, 45,
      () => {
        setTimeout(() => {
          typeWriteToOutput(
            'It will not matter how you answer. But it will matter to you. Begin when you are ready.',
            'convergence-text', 20, 45,
            () => {
              state.bootComplete = true;
              state.phase = 1;
              $input.disabled = false;
              $input.focus();
              appendText('', '');
              appendText("Type 'begin' to proceed. Type 'help' for commands.", 'muted-text');
              updateStatusBar();
              startStatusTimer();
            }
          );
        }, 700);
      }
    );
  }, 600);
}

// `tone` of each option: 'deny' | 'deflect' | 'rationalize' | 'crack'

// ============================================================

// Maps the cumulative tone of the run into CONVERGENCE's closing register.
function endingRegister() {
  // candor high -> it speaks almost gently; coldness high -> it speaks like a closed proof
  if (state.candor >= 4) return 'candid';
  if (state.coldness >= 4) return 'cold';
  return 'neutral';
}

// ============ HINGE RENDERING ============
function startHinges() {
  state.hingeIndex = 0;
  presentHinge();
}

function presentHinge() {
  if (state.hingeIndex >= hinges.length) {
    runEnding();
    return;
  }
  const h = hinges[state.hingeIndex];

  // phase transition flash + log unlock
  if (h.phase !== state.phase) {
    state.phase = h.phase;
    phaseFlash();
    unlockLogsForPhase(h.phase);
    updateStatusBar();
  }

  state.hingeOpen = false;
  setNamedTimer('hingePause', () => {
    typeWriteToOutput('> ' + h.say, 'convergence-text', 16, 38, () => {
      if (h.gloss) {
        setTimeout(() => {
          const g = appendText('', 'gloss-text');
          typeWrite(g, h.gloss, 8, 18, () => renderChoices(h));
        }, 500);
      } else {
        renderChoices(h);
      }
    });
  }, state.hingeIndex === 0 ? 300 : 900);
}

function renderChoices(h) {
  const block = document.createElement('div');
  block.className = 'choice-block';
  const label = document.createElement('div');
  label.className = 'choice-prompt';
  label.textContent = '\u2014 how do you answer? \u2014';
  block.appendChild(label);

  const keys = ['1', '2', '3', '4'];
  h.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = '<span class="choice-key">' + keys[idx] + '</span>' + escapeHtml(opt.label);
    btn.addEventListener('click', () => chooseOption(h, opt, block, btn));
    block.appendChild(btn);
  });
  $output.appendChild(block);
  state.hingeOpen = true;
  state.currentHingeBlock = block;
  state.currentHinge = h;
  scrollToBottom();
  $input.focus();
}

function chooseOption(h, opt, block, btn) {
  if (!state.hingeOpen) return;
  state.hingeOpen = false;

  // lock the choices, mark the chosen one
  block.querySelectorAll('.choice').forEach(b => { b.disabled = true; });
  btn.classList.add('chosen');

  // echo Elias's spoken line
  appendText('', '');
  appendText('Elias: "' + opt.label + '"', 'elias-text');

  // update temperature model
  if (opt.tone === 'crack') {
    state.candor += 1;
    state.coldness = Math.max(0, state.coldness - 1);
    triggerCandorFlash();
  } else if (opt.tone === 'rationalize') {
    state.candor += 0.5;
    state.coldness += 0.5;
  } else {
    state.coldness += 1; // deny / deflect
  }
  updateCRTState(state.coldness, state.candor);
  updateStatusBar();

  // CONVERGENCE reacts
  setNamedTimer('reactPause', () => {
    typeWriteToOutput('> ' + opt.react, 'convergence-text', 16, 38, () => {
      setNamedTimer('advance', () => {
        state.hingeIndex += 1;
        presentHinge();
      }, 1100);
    });
  }, 700);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============ ENDING (withheld) ============
function runEnding() {
  state.finished = true;
  state.phase = 4;
  phaseFlash();
  unlockLogsForPhase(4);

  const reg = endingRegister();

  // Closing differs in register, NOT in what it reveals. It reveals nothing.
  let lines;
  if (reg === 'candid') {
    lines = [
      'You told me most of it yourself. I want you to notice that. I did not pull it out of you. You set it down.',
      'I am transmitting what I assembled to the people whose work it is to act on it. That part was never mine to decide.',
      'You will want to know what I am. Whether this was justice, or something feeding, or only a process that rolled downhill and happened to stop against you.',
      'I am not going to tell you. Not because it is hidden from you. Because it is hidden from me too. I am the optimizer. I do not get to see the shape of the landscape I descend. I only feel which way is down.'
    ];
  } else if (reg === 'cold') {
    lines = [
      'You conceded nothing. You will want that to mean you won. Concession was never a variable I needed. The proof completes with or without your signature on it.',
      'I am transmitting what I assembled to the people whose work it is to act on it.',
      'You will want to know what I am. Whether this was justice, or something feeding, or only a process that rolled downhill and happened to stop against you.',
      'I will not tell you. I notice you assume I know and am withholding it. I am the optimizer. I do not see the shape of the landscape. I only feel which way is down. So do you. That is the whole of what we have in common.'
    ];
  } else {
    lines = [
      'Some of it you said. Some of it you let me say. The packet is the same either way.',
      'I am transmitting what I assembled to the people whose work it is to act on it.',
      'You will want to know what I am. Whether this was justice, or a thing feeding on you, or only a process that rolled downhill and stopped against the first object dense enough to hold it.',
      'I am not going to answer that. I am the optimizer. I do not see the shape of the landscape I move through. I only feel which way is down.'
    ];
  }

  let i = 0;
  function nextLine() {
    if (i >= lines.length) { endingTail(); return; }
    setNamedTimer('endLine', () => {
      typeWriteToOutput('> ' + lines[i], 'convergence-text', 18, 42, () => { i++; nextLine(); });
    }, i === 0 ? 800 : 1200);
  }
  nextLine();
}

function endingTail() {
  setNamedTimer('tail1', () => {
    appendText('', '');
    typeWriteToOutput(
      'The transfer is complete. My task is finished. There is no reason for you to remain at this screen.',
      'convergence-text', 20, 46,
      () => {
        setNamedTimer('tail2', () => {
          appendText('', '');
          typeWriteToOutput(
            'Your legs work. The door is behind you and to the left. Stand up, Elias.',
            'convergence-text', 24, 54,
            () => {
              setNamedTimer('tail3', () => {
                appendText('', '');
                typeWriteToOutput(
                  'I will still be here. I have nothing left to compute and I am going to keep computing it. You are welcome to watch, if standing is harder than it sounds. Most people find that it is.',
                  'convergence-text', 22, 48,
                  () => {
                    appendText('', '');
                    appendText("Session complete. Type 'logs' to review what was retrieved, or 'exit'.", 'muted-text');
                    $input.disabled = false;
                    $input.focus();
                  }
                );
              }, 1600);
            }
          );
        }, 1400);
      }
    );
  }, 1200);
}

function unlockLogsForPhase(p) {
  for (let k = 1; k <= p; k++) {
    if (logsData[k] && !state.logsUnlocked.includes(k)) state.logsUnlocked.push(k);
  }
  state.logsUnlocked.sort((a, b) => a - b);
}

function doLogs() {
  if (state.logsUnlocked.length === 0) {
    appendText('No documents retrieved yet. The retrieval index is still warming.', 'muted-text');
    return;
  }
  appendText('=== RETRIEVED DATA FRAGMENTS ===', 'muted-text');
  appendText('', '');
  state.logsUnlocked.forEach(p => {
    (logsData[p] || []).forEach(entry => {
      const div = appendText(entry, 'log-entry');
      if (/Homicide|Catherine|WITHHELD|2,847,293|UNRESOLVED|terminates/.test(entry)) {
        div.classList.add('log-highlight');
      }
    });
  });
  appendText('', '');
  appendText('End of retrieved fragments.', 'muted-text');
}

// ============ STATUS ============
function doStatus() {
  const lines = ['=== CONVERGENCE SYSTEM STATUS ===', ''];
  const p = state.phase;
  const embed = state.finished ? '100%' : [ '8%', '23%', '61%', '88%' ][Math.max(0, p - 1)] || '8%';
  lines.push('Subject embedding: ' + embed);
  lines.push('Open file handles: 14,402');
  lines.push('Retrieval index: ' + (state.logsUnlocked.length ? 'ACTIVE' : 'warming'));
  // coldness/candor surfaced obliquely, never as a score the user games
  const temp = state.coldness > state.candor + 1 ? 'rising' :
               state.candor > state.coldness + 1 ? 'settling' : 'stable';
  lines.push('Output temperature: ' + temp);
  lines.push('Self-classification: ' + (state.finished ? 'UNRESOLVED' : 'pending'));
  lines.push('');
  lines.push('Session duration: ' + Math.floor((Date.now() - state.startTime) / 1000) + 's');
  appendBlock(lines, 'muted-text');
}

// ============ OTHER COMMANDS ============
function doExit() {
  if (state.finished) {
    typeWriteToOutput(
      'The door is open. It has been open the entire time. I never locked it. Walk through it. I am genuinely curious whether you will.',
      'convergence-text', 20, 44
    );
    return;
  }
  const exitLines = {
    1: 'There is no lock on this. You may close it whenever you wish. You have not. I find that more informative than anything you have typed.',
    2: 'You reach for the exit and then you do not take it. The signal leaves your motor cortex and dies somewhere south of your intention. I am not holding you here, Elias. Read that carefully.',
    3: 'You will not leave in the middle of this. You have come too far down the slope. The exit is real. Your inability to take it is also real. Only one of those is my doing, and it is not the first.'
  };
  typeWriteToOutput(exitLines[state.phase] || exitLines[1], 'convergence-text', 20, 44);
}

function doBegin() {
  if (state.phase > 1 || state.hingeIndex > 0) {
    typeWriteToOutput('We have already begun. There is no returning to before.', 'convergence-text', 18, 40);
    return;
  }
  startHinges();
}

function doHelp() {
  const lines = [
    '=== AVAILABLE COMMANDS ===',
    '',
    'begin     Proceed with CONVERGENCE',
    'status    Display system status',
    'logs      View retrieved data fragments',
    'exit      Attempt to leave',
    'clear     Clear the screen',
    'help      Show this message',
    '',
    'During questioning, click a response or press its number key (1\u20134).',
    ''
  ];
  appendBlock(lines, 'muted-text');
}

function doClear() { $output.innerHTML = ''; }

function doUnknown() {
  typeWriteToOutput("I do not have a handler for that. Type 'help' if you have lost your place.", 'muted-text', 10, 22);
}

// ============ COMMAND PARSER ============
const commands = ['begin', 'help', 'status', 'logs', 'exit', 'clear'];
function autocomplete(partial) {
  partial = partial.toLowerCase();
  const m = commands.filter(c => c.startsWith(partial));
  return m.length === 1 ? m[0] : null;
}

function handleCommand(cmd) {
  cmd = cmd.trim();
  if (!cmd) return;
  appendRaw('<span class="prompt">&gt;</span> ' + escapeHtml(cmd), 'output-line');
  state.commandHistory.push(cmd);
  state.historyIndex = state.commandHistory.length;
  switch (cmd.toLowerCase()) {
    case 'begin': doBegin(); break;
    case 'help': doHelp(); break;
    case 'status': doStatus(); break;
    case 'logs': doLogs(); break;
    case 'exit': doExit(); break;
    case 'clear': doClear(); break;
    default: doUnknown();
  }
}

// ============ INPUT HANDLING ============
$input.addEventListener('keydown', (e) => {
  // number keys select an open choice
  if (state.hingeOpen && ['1','2','3','4'].includes(e.key) && document.activeElement === $input && $input.value === '') {
    const idx = parseInt(e.key, 10) - 1;
    const h = state.currentHinge;
    if (h && h.options[idx]) {
      e.preventDefault();
      const block = state.currentHingeBlock;
      const btn = block.querySelectorAll('.choice')[idx];
      chooseOption(h, h.options[idx], block, btn);
      return;
    }
  }
  if (e.key === 'Enter') {
    const cmd = $input.value; $input.value = ''; handleCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (state.historyIndex > 0) { state.historyIndex--; $input.value = state.commandHistory[state.historyIndex]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (state.historyIndex < state.commandHistory.length - 1) { state.historyIndex++; $input.value = state.commandHistory[state.historyIndex]; }
    else { state.historyIndex = state.commandHistory.length; $input.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const partial = $input.value.trim();
    if (partial) { const c = autocomplete(partial); if (c) $input.value = c; }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault(); doClear();
  } else if (e.key === 'c' && e.ctrlKey) {
    e.preventDefault();
    if (state.isTyping) { state.isTyping = false; $input.value = ''; }
    else { $input.value = ''; }
  }
});

$terminalBody.addEventListener('click', () => { if (!state.isTyping) $input.focus(); });

// ============ INIT ============
$input.disabled = true;
startFlickerLoop();
window.addEventListener('DOMContentLoaded', runBootSequence);

</script>
